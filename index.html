<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Militsa Yanakieva</title>
    <meta name="description" content="Militsa Yanakieva - Digital Designer" />
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          const shouldSkipLoader = sessionStorage.getItem("skipMainLoaderOnce") === "1";
          if (shouldSkipLoader) {
            document.documentElement.classList.add("skip-main-loader");
            sessionStorage.removeItem("skipMainLoaderOnce");
          }
        } catch (error) {
          // Ignore storage errors and keep default loader behavior.
        }
      })();
    </script>
    <style>
      :root {
        --bg: #eae8e1;
        --text: #111;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      html {
        scroll-behavior: smooth;
        scrollbar-gutter: stable;
        overflow-x: hidden;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      body.is-loading:not(.is-loader-skipped) {
        overflow: hidden;
      }

      .preloader {
        position: fixed;
        inset: 0;
        z-index: 2000;
        display: grid;
        place-content: center;
        background: #111;
        transform: translateY(0);
        visibility: visible;
        transition: transform 0.85s cubic-bezier(0.22, 1, 0.36, 1),
          visibility 0s linear 0.85s;
      }

      body.is-loaded .preloader {
        transform: translateY(-100%);
        visibility: hidden;
      }

      .skip-main-loader .preloader {
        display: none;
      }

      .preloader__counter {
        margin: 0;
        display: inline-flex;
        align-items: flex-end;
        gap: 0.02em;
        font-family: "Antonio", Impact, Haettenschweiler, "Arial Narrow Bold",
          sans-serif;
        font-size: clamp(6rem, 20vw, 15rem);
        line-height: 0.9;
        letter-spacing: 0.02em;
        color: #e0dfd9;
        font-variant-numeric: tabular-nums;
      }

      .preloader__counter-slot {
        height: clamp(5.4rem, 18vw, 13.5rem);
        overflow: hidden;
        display: grid;
        align-items: end;
      }

      .preloader__counter-digit {
        display: inline-block;
        transform: translateY(110%);
        opacity: 0;
        animation: percentRise 0.62s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .site-shell {
        opacity: 1;
        transform: translateY(95px);
        transition: transform 2.85s cubic-bezier(0.18, 0.78, 0.16, 1);
      }

      body.is-loaded .site-shell {
        transform: translateY(0);
      }

      .skip-main-loader .site-shell {
        transform: translateY(0);
        transition: none;
      }

      .landing {
        min-height: calc(100vh - 5.75rem);
        min-height: calc(100svh - 5.75rem);
        padding: 1.75rem 3.75rem 3rem;
        display: flex;
        flex-direction: column;
      }

      .top-row {
        position: sticky;
        top: 0;
        z-index: 1000;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1.5rem;
        padding: 2.25rem 3.75rem 0.75rem;
        background: transparent;
        color: #111;
      }

      .top-row.site-nav {
        transition: none;
      }

      .top-row.site-nav.nav--on-light {
        color: #3a332a;
      }

      .top-row.site-nav.nav--on-warm {
        color: #2e261d;
      }

      .top-row.site-nav.nav--on-dark {
        color: #faf4ec;
      }

      .top-row.site-nav.nav--on-dark .menu a,
      .top-row.site-nav.nav--on-dark .menu .menu__text {
        color: #faf4ec;
      }

      .top-row.site-nav .menu a,
      .top-row.site-nav .menu .menu__text {
        transition: none;
      }

      .meta {
        display: flex;
        align-items: center;
        gap: 1rem;
        font-weight: 400;
        font-size: 1.1rem;
        letter-spacing: 0.01em;
      }

      .meta__dot {
        font-size: 1.35rem;
        line-height: 1;
        margin-top: -0.1em;
      }

      .meta__coords,
      .meta__time {
        white-space: nowrap;
      }

      .menu {
        display: flex;
        align-items: center;
        gap: 3.25rem;
      }

      .menu a {
        color: inherit;
        text-decoration: none;
        text-transform: uppercase;
        font-weight: 700;
        font-size: 20px;
        letter-spacing: 0.01em;
        display: inline-block;
        line-height: 1;
      }

      .menu__mask {
        display: inline-block;
        overflow: hidden;
        position: relative;
        vertical-align: top;
      }

      .menu__text {
        display: inline-block;
        transform: translate3d(0, 0, 0);
        will-change: transform, opacity;
      }

      .menu__text--clone {
        position: absolute;
        top: 0;
        left: 0;
      }

      .menu__text--exit {
        animation: navExitUp 0.45s cubic-bezier(0.4, 0, 0.6, 1) forwards;
      }

      .menu__text--enter {
        animation: navEnterFromBottom 1.3s cubic-bezier(0.76, 0, 0.24, 1)
          forwards;
      }

      .hero {
        flex: 1;
        display: grid;
        place-content: center;
        text-align: center;
        margin-top: 2.5rem;
      }

      .hero__title {
        margin: 0;
        font-family: "Anton", Impact, Haettenschweiler, "Arial Narrow Bold",
          sans-serif;
        text-transform: uppercase;
        font-size: clamp(2.9rem, 11.2vw, 11.4rem);
        line-height: 0.92;
        letter-spacing: 0.012em;
        white-space: nowrap;
        color: #111;
        transform: translateY(0);
        transition: transform 1.9s cubic-bezier(0.16, 0.8, 0.14, 1);
        will-change: transform;
      }

      .hero__title.is-title-lifted {
        transform: translateY(-100px);
      }

      .hero__title-inner {
        display: inline-flex;
        align-items: baseline;
        white-space: nowrap;
      }

      .letter-mask {
        display: inline-block;
        overflow: hidden;
        position: relative;
      }

      .letter {
        display: inline-block;
        transform: translate3d(var(--start-x, 110%), var(--start-y, 0), 0);
        backface-visibility: hidden;
        -webkit-font-smoothing: antialiased;
        will-change: transform;
      }

      .letter-mask--space {
        width: 0.28em;
      }

      .hero__title.is-title-animating .letter {
        animation-name: var(--intro-animation, enterFromRight);
        animation-duration: 1.4s;
        animation-delay: var(--delay, 0s);
        animation-timing-function: cubic-bezier(0.76, 0, 0.24, 1);
        animation-fill-mode: forwards;
      }

      .hero__title.is-title-done .letter:not(.letter--clone) {
        transform: translate3d(0, 0, 0);
      }

      .letter.letter--exit {
        animation: exitLeft 0.55s cubic-bezier(0.3, 0.05, 0.35, 1) forwards;
      }

      .letter.letter--clone {
        position: absolute;
        top: 0;
        left: 0;
      }

      .letter.letter--enter {
        animation: enterRight 1.45s cubic-bezier(0.62, 0.04, 0.2, 1) forwards;
      }

      .content-section {
        min-height: 100vh;
        padding: 3rem 3.75rem;
        display: grid;
        align-content: center;
        scroll-margin-top: 5.75rem;
      }

      .site-footer {
        padding: 1rem 3.75rem 1.35rem;
        margin: 0;
        border-top: 1px solid rgba(0, 0, 0, 0.06);
      }

      .site-footer__inner {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .site-footer__email {
        font-size: 0.875rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        color: #5a5a5a;
        text-decoration: none;
      }

      .site-footer__email:hover {
        color: #111;
      }

      .site-footer__email:focus-visible {
        outline: 2px solid #111;
        outline-offset: 3px;
      }

      .content-section__title {
        margin: 0;
        text-transform: uppercase;
        font-weight: 700;
        font-size: clamp(2rem, 7vw, 5rem);
        letter-spacing: 0.02em;
      }

      .content-section__text {
        margin: 1rem 0 0;
        max-width: 38rem;
        font-size: 1.15rem;
        line-height: 1.6;
      }

      .scroll-animate {
        opacity: 0;
        transform: translate3d(var(--reveal-x, 0), var(--reveal-y, 52px), 0);
        transition:
          opacity 0.9s cubic-bezier(0.22, 0.82, 0.2, 1),
          transform 0.9s cubic-bezier(0.22, 0.82, 0.2, 1);
        transition-delay: var(--reveal-delay, 0s);
        will-change: opacity, transform;
      }

      .scroll-animate.is-visible {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }

      .scroll-animate--section {
        opacity: 0;
        transform: translate3d(0, 130px, 0);
        transition:
          opacity 1.05s cubic-bezier(0.22, 0.82, 0.2, 1),
          transform 1.35s cubic-bezier(0.22, 0.82, 0.2, 1);
        will-change: opacity, transform;
      }

      .scroll-animate--section.is-visible {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }

      .work-showcase {
        --work-marquee-duration: 34s;
        position: relative;
        z-index: 0;
        isolation: isolate;
        background: var(--bg);
        color: var(--text);
        padding: clamp(2.5rem, 5vw, 4rem) 0 clamp(2.25rem, 4vw, 3.5rem);
        overflow-x: hidden;
        overflow-x: clip;
      }

      .work-showcase__panel {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: clamp(1rem, 2.5vw, 1.65rem);
      }

      .work-showcase.scroll-animate--section {
        transform: translate3d(0, 155px, 0);
      }

      .work-showcase.scroll-animate--section.is-visible {
        transform: translate3d(0, 0, 0);
      }

      .work-showcase__heading {
        margin: 0;
        padding-inline: 3.75rem;
        text-align: left;
        font-family: "Anton", Impact, Haettenschweiler, "Arial Narrow Bold",
          sans-serif;
        font-size: clamp(2rem, 5.5vw, 3.75rem);
        font-weight: 400;
        line-height: 1;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: var(--text);
      }

      .work-showcase__marquee {
        width: 100%;
      }

      .work-showcase__marquee-viewport {
        position: relative;
        width: 100%;
        max-width: none;
        overflow: hidden;
        transform: translate3d(0, 0, 0);
        backface-visibility: hidden;
        contain: paint;
      }

      .work-showcase__marquee-track {
        display: flex;
        width: max-content;
        animation: workShowcaseMarquee var(--work-marquee-duration) linear infinite;
        backface-visibility: hidden;
      }

      .work-showcase__marquee-row {
        display: flex;
        flex-shrink: 0;
        align-items: center;
        gap: clamp(0.55rem, 1.4vw, 1.1rem);
        margin: 0;
        padding: 0 clamp(0.55rem, 1.4vw, 1.1rem) 0 0;
        list-style: none;
      }

      .work-showcase__marquee-row li {
        flex: 0 0 auto;
      }

      .work-showcase__marquee-link {
        display: block;
        line-height: 0;
        text-decoration: none;
        color: inherit;
      }

      .work-showcase__marquee-link:focus-visible {
        outline: 2px solid currentColor;
        outline-offset: 4px;
      }

      .work-showcase__marquee-row img {
        display: block;
        width: clamp(280px, 38vw, 520px);
        height: auto;
        aspect-ratio: 1;
        object-fit: cover;
        background: #d8d6cf;
      }

      @keyframes workShowcaseMarquee {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .work-showcase__marquee-track {
          animation: none;
        }

        .hero__title.is-title-lifted {
          transition: none;
          transform: translateY(-100px);
        }
      }

      .content-section--manifesto.scroll-animate--section {
        transform: translate3d(0, 155px, 0);
      }

      .content-section--manifesto.scroll-animate--section.is-visible {
        transform: translate3d(0, 0, 0);
      }

      .content-section--manifesto {
        background: #0d334c;
        color: #edccb2;
        position: relative;
        z-index: 1;
        margin-top: -1px;
        overflow: hidden;
        min-height: calc(100vh + 180px);
        padding-top: calc(3rem + 100px);
        padding-bottom: calc(3rem + 100px + 180px);
        padding-inline: 3.75rem;
      }

      .manifesto {
        width: 100%;
        max-width: 1180px;
        margin: 0 auto;
        display: grid;
        place-items: center;
      }

      .manifesto__headline {
        margin: 0;
        text-transform: uppercase;
        font-family: "Antonio", Impact, Haettenschweiler, "Arial Narrow Bold",
          sans-serif;
        font-size: clamp(2.2rem, 8.2vw, 7.4rem);
        line-height: 1.02;
        letter-spacing: 0.002em;
        color: #edccb2;
        text-align: center;
      }

      .manifesto__line {
        display: block;
      }

      .manifesto__line--with-left,
      .manifesto__line--with-right {
        display: inline-flex;
        align-items: flex-start;
        gap: clamp(0.6rem, 1.8vw, 1.35rem);
      }

      .manifesto__line-main {
        display: inline-block;
        opacity: 0;
        will-change: transform, opacity;
      }

      .manifesto__line-main--row-1 {
        transform: translate3d(120vw, 0, 0);
      }

      .manifesto__line-main--row-2 {
        transform: translate3d(-120vw, 0, 0);
      }

      .manifesto__line-main--row-3 {
        transform: translate3d(120vw, 0, 0);
      }

      .content-section--manifesto.is-visible .manifesto__line-main--row-1 {
        animation: quoteEnterFromRight 1.35s cubic-bezier(0.22, 0.82, 0.2, 1) 0.16s
          forwards;
      }

      .content-section--manifesto.is-visible .manifesto__line-main--row-2 {
        animation: quoteEnterFromLeft 1.35s cubic-bezier(0.22, 0.82, 0.2, 1) 0.4s
          forwards;
      }

      .content-section--manifesto.is-visible .manifesto__line-main--row-3 {
        animation: quoteEnterFromRight 1.35s cubic-bezier(0.22, 0.82, 0.2, 1) 0.64s
          forwards;
      }

      .manifesto__kicker {
        font-family: "Antonio", "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-weight: 400;
        text-transform: uppercase;
        font-size: clamp(0.65rem, 1.45vw, 1.55rem);
        line-height: 1.05;
        letter-spacing: 0.02em;
        color: #edccb2;
        text-align: left;
        white-space: nowrap;
        align-self: center;
        display: inline-block;
        overflow: hidden;
        position: relative;
        transform: translate3d(0, var(--kicker-shift, 0px), 0);
        will-change: transform;
      }

      .manifesto__kicker--left {
        text-align: right;
      }

      .manifesto__kicker-inner {
        display: inline-block;
        transform: translate3d(0, 0, 0);
        will-change: transform, opacity;
      }

      .manifesto__kicker-inner--clone {
        position: absolute;
        top: 0;
        left: 0;
      }

      .manifesto__kicker-inner--exit {
        animation: navExitUp 0.45s cubic-bezier(0.4, 0, 0.6, 1) forwards;
      }

      .manifesto__kicker-inner--enter {
        animation: navEnterFromBottom 1.3s cubic-bezier(0.76, 0, 0.24, 1)
          forwards;
      }

      @keyframes enterFromRight {
        0% {
          transform: translate3d(110%, 0, 0);
        }
        60% {
          transform: translate3d(-2%, 0, 0);
        }
        100% {
          transform: translate3d(0, 0, 0);
        }
      }

      @keyframes enterFromTop {
        0% {
          transform: translate3d(0, -110%, 0);
        }
        60% {
          transform: translate3d(0, 2%, 0);
        }
        100% {
          transform: translate3d(0, 0, 0);
        }
      }

      @keyframes enterFromBottom {
        0% {
          transform: translate3d(0, 110%, 0);
        }
        60% {
          transform: translate3d(0, -2%, 0);
        }
        100% {
          transform: translate3d(0, 0, 0);
        }
      }

      @keyframes exitLeft {
        0% {
          transform: translate3d(0, 0, 0);
        }
        100% {
          transform: translate3d(-110%, 0, 0);
        }
      }

      @keyframes enterRight {
        0% {
          transform: translate3d(110%, 0, 0);
        }
        85% {
          transform: translate3d(-2%, 0, 0);
        }
        100% {
          transform: translate3d(0, 0, 0);
        }
      }

      @keyframes navExitUp {
        0% {
          transform: translate3d(0, 0, 0);
          opacity: 1;
        }
        100% {
          transform: translate3d(0, -110%, 0);
          opacity: 0;
        }
      }

      @keyframes navEnterFromBottom {
        0% {
          transform: translate3d(0, 110%, 0);
        }
        85% {
          transform: translate3d(0, -2%, 0);
        }
        100% {
          transform: translate3d(0, 0, 0);
        }
      }

      @keyframes quoteEnterFromRight {
        0% {
          opacity: 0;
          transform: translate3d(120vw, 0, 0);
        }
        60% {
          opacity: 1;
          transform: translate3d(-2%, 0, 0);
        }
        100% {
          opacity: 1;
          transform: translate3d(0, 0, 0);
        }
      }

      @keyframes quoteEnterFromLeft {
        0% {
          opacity: 0;
          transform: translate3d(-120vw, 0, 0);
        }
        60% {
          opacity: 1;
          transform: translate3d(2%, 0, 0);
        }
        100% {
          opacity: 1;
          transform: translate3d(0, 0, 0);
        }
      }

      @keyframes percentRise {
        0% {
          opacity: 0;
          transform: translateY(110%);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 1200px) {
        .landing {
          min-height: calc(100vh - 6.5rem);
          min-height: calc(100svh - 6.5rem);
          padding: 1.5rem 1.8rem 2rem;
        }

        .top-row {
          flex-direction: column;
          gap: 1.25rem;
          padding: 1.8rem 1.8rem 0.65rem;
        }

        .menu {
          gap: 1.5rem;
        }

        .menu a {
          font-size: 1.2rem;
        }

        .meta {
          font-size: 0.9rem;
          gap: 0.6rem;
          flex-wrap: wrap;
        }

        .content-section {
          padding: 2rem 1.8rem;
        }

        .content-section--manifesto {
          padding-top: calc(2rem + 100px);
          padding-bottom: calc(2rem + 100px);
          padding-inline: 1.8rem;
        }

        .work-showcase__heading {
          padding-inline: 1.8rem;
        }

      }

      @media (max-width: 900px) {
        .top-row {
          padding: 1.35rem 1.25rem 0.5rem;
          gap: 0.85rem;
        }

        .meta {
          font-size: 0.8rem;
          gap: 0.5rem;
        }

        .menu {
          gap: 1rem;
          width: 100%;
          justify-content: flex-start;
        }

        .menu a {
          font-size: 16px;
        }

        .landing {
          min-height: calc(100vh - 7rem);
          min-height: calc(100svh - 7rem);
          padding: 1.25rem 1.25rem 2rem;
        }

        .content-section {
          scroll-margin-top: 7rem;
        }

        .hero__title {
          font-size: clamp(2.15rem, 11.5vw, 6.9rem);
        }

        .manifesto__headline {
          font-size: clamp(2rem, 11vw, 5.3rem);
        }

        .manifesto__kicker {
          font-size: clamp(0.58rem, 1.8vw, 1.1rem);
          white-space: normal;
        }

        .work-showcase__heading {
          padding-inline: 1.25rem;
        }

        .work-showcase__marquee-row img {
          width: clamp(200px, 52vw, 400px);
        }
      }

      @media (max-width: 560px) {
        .menu a {
          font-size: 14px;
        }

        .meta {
          font-size: 0.74rem;
        }

        .manifesto__line--with-left,
        .manifesto__line--with-right {
          display: grid;
          justify-items: center;
          gap: 0.5rem;
        }

        .manifesto__kicker {
          text-align: center;
        }

        .site-footer {
          padding-inline: 1.25rem;
        }

        .site-footer__email {
          overflow-wrap: anywhere;
          text-align: center;
        }
      }
    </style>
  </head>
  <body class="is-loading">
    <div class="preloader" aria-hidden="true">
      <div class="preloader__counter-slot">
        <p class="preloader__counter" id="preloader-counter"></p>
      </div>
    </div>

    <div class="site-shell">
      <div class="top-row site-nav nav--on-light">
        <div class="meta" aria-label="Location, coordinates and London time">
          <span class="meta__dot" aria-hidden="true">●</span>
          <span>London, UK</span>
          <span class="meta__time" id="london-time">--:-- GMT</span>
        </div>

        <nav class="menu" aria-label="Main navigation">
          <a href="./work.html" class="menu__link nav-link">
            <span class="menu__mask">
              <span class="menu__text">Work</span>
            </span>
          </a>
          <a href="./about.html" class="menu__link nav-link">
            <span class="menu__mask">
              <span class="menu__text">About</span>
            </span>
          </a>
          <a href="./contact.html" class="menu__link nav-link">
            <span class="menu__mask">
              <span class="menu__text">Contact</span>
            </span>
          </a>
        </nav>
      </div>

      <main class="landing" data-theme="light">
        <section class="hero" aria-label="Intro">
          <h1 class="hero__title" id="hero-title"></h1>
        </section>
      </main>

      <section
        class="work-showcase"
        id="selected-work"

    <script>
      const londonTimeElement = document.getElementById("london-time");
      const heroTitleElement = document.getElementById("hero-title");
      const preloaderCounterElement = document.getElementById("preloader-counter");
      const heroTitleText = "MILITSA YANAKIEVA";

      function getGmtOffsetLabel() {
        const now = new Date();
        const londonTimeAsDate = new Date(
          now.toLocaleString("en-US", { timeZone: "Europe/London" })
        );
        const minutesOffset = Math.round((londonTimeAsDate - now) / 60000);
        const sign = minutesOffset >= 0 ? "+" : "-";
        const absMinutes = Math.abs(minutesOffset);
        const hours = String(Math.floor(absMinutes / 60)).padStart(2, "0");
        const minutes = String(absMinutes % 60).padStart(2, "0");
        return `GMT${sign}${hours}:${minutes}`;
      }

      function updateLondonTime() {
        const timeValue = new Intl.DateTimeFormat("en-GB", {
          timeZone: "Europe/London",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        }).format(new Date());

        londonTimeElement.textContent = `${timeValue} ${getGmtOffsetLabel()}`;
      }

      function animateTitleLetters() {
        heroTitleElement.classList.remove(
          "is-title-animating",
          "is-title-done",
          "is-title-lifted"
        );
        const chars = heroTitleText.split("");
        const introDirections = [
          { name: "enterFromRight", startX: "110%", startY: "0%" },
          { name: "enterFromTop", startX: "0%", startY: "-110%" },
          { name: "enterFromBottom", startX: "0%", startY: "110%" }
        ];
        let letterIndex = 0;

        const titleMarkup = chars
          .map((char) => {
            if (char === " ") {
              return '<span class="letter-mask letter-mask--space" aria-hidden="true"></span>';
            }

            const direction =
              introDirections[Math.floor(Math.random() * introDirections.length)];
            const delay = letterIndex * 0.16;
            letterIndex += 1;
            return `<span class="letter-mask"><span class="letter" style="--delay:${delay.toFixed(
              3
            )}s;--intro-animation:${direction.name};--start-x:${direction.startX};--start-y:${direction.startY};">${char}</span></span>`;
          })
          .join("");

        heroTitleElement.innerHTML = `<span class="hero__title-inner" aria-label="${heroTitleText}">${titleMarkup}</span>`;
        heroTitleElement.offsetWidth;
        heroTitleElement.classList.add("is-title-animating");

        const introDurationMs = 1400 + Math.max(0, letterIndex - 1) * 160;
        setTimeout(() => {
          heroTitleElement.classList.remove("is-title-animating");
          heroTitleElement.classList.add("is-title-done");
          setupTitleHoverTicker();
          heroTitleElement.classList.add("is-title-lifted");
        }, introDurationMs + 20);
      }

      function setupTitleHoverTicker() {
        const masks = heroTitleElement.querySelectorAll(".letter-mask");

        masks.forEach((mask) => {
          if (
            mask.classList.contains("letter-mask--space") ||
            mask.dataset.tickerBound === "true"
          ) {
            return;
          }

          mask.dataset.tickerBound = "true";
          mask.addEventListener("mouseenter", () => {
            if (mask.dataset.animating === "true") {
              return;
            }

            const originalLetter = mask.querySelector(".letter:not(.letter--clone)");
            if (!originalLetter) {
              return;
            }

            mask.dataset.animating = "true";
            originalLetter.classList.remove("letter--exit");
            originalLetter.style.transform = "translate3d(0, 0, 0)";
            originalLetter.offsetWidth;
            originalLetter.classList.add("letter--exit");

            const clone = originalLetter.cloneNode(true);
            clone.classList.remove("letter--exit");
            clone.classList.add("letter--clone", "letter--enter");
            mask.appendChild(clone);

            originalLetter.addEventListener(
              "animationend",
              () => {
                originalLetter.classList.remove("letter--exit");
                originalLetter.style.transform = "translate3d(-110%, 0, 0)";
              },
              { once: true }
            );

            clone.addEventListener(
              "animationend",
              () => {
                clone.remove();
                originalLetter.style.transform = "translate3d(0, 0, 0)";
                mask.dataset.animating = "false";
              },
              { once: true }
            );
          });
        });
      }

      function setupNavHoverTicker() {
        const navMasks = document.querySelectorAll(".menu__mask");
        const navLinks = document.querySelectorAll(".menu .menu__link");

        navLinks.forEach((link) => {
          if (link.dataset.loaderFlagBound === "true") {
            return;
          }

          link.dataset.loaderFlagBound = "true";
          link.addEventListener("click", () => {
            try {
              sessionStorage.setItem("skipMainLoaderOnce", "1");
            } catch (error) {
              // Ignore storage errors and keep default loader behavior.
            }
          });
        });

        navMasks.forEach((mask) => {
          if (mask.dataset.tickerBound === "true") {
            return;
          }

          mask.dataset.tickerBound = "true";
          mask.addEventListener("mouseenter", () => {
            if (mask.dataset.animating === "true") {
              return;
            }

            const originalText = mask.querySelector(".menu__text:not(.menu__text--clone)");
            if (!originalText) {
              return;
            }

            mask.dataset.animating = "true";
            originalText.classList.remove("menu__text--exit");
            originalText.style.opacity = "1";
            originalText.style.transform = "translate3d(0, 0, 0)";
            originalText.offsetWidth;
            originalText.classList.add("menu__text--exit");

            const clone = originalText.cloneNode(true);
            clone.classList.remove("menu__text--exit");
            clone.classList.add("menu__text--clone", "menu__text--enter");
            mask.appendChild(clone);

            originalText.addEventListener(
              "animationend",
              () => {
                originalText.classList.remove("menu__text--exit");
                originalText.style.opacity = "0";
                originalText.style.transform = "translate3d(0, 0, 0)";
              },
              { once: true }
            );

            clone.addEventListener(
              "animationend",
              () => {
                clone.remove();
                originalText.style.opacity = "1";
                originalText.style.transform = "translate3d(0, 0, 0)";
                mask.dataset.animating = "false";
              },
              { once: true }
            );
          });
        });
      }

      function setupWorkShowcaseMarqueeNavLinks() {
        document.querySelectorAll('a.work-showcase__marquee-link[href="./work.html"]').forEach((link) => {
          if (link.dataset.loaderFlagBound === "true") {
            return;
          }

          link.dataset.loaderFlagBound = "true";
          link.addEventListener("click", () => {
            try {
              sessionStorage.setItem("skipMainLoaderOnce", "1");
            } catch (error) {
              // Ignore storage errors and keep default loader behavior.
            }
          });
        });
      }

      function setupScrollAnimations() {
        const oneShotTargets = [];
        const replayTargets = [];
        const sections = document.querySelectorAll(".content-section");
        const prefersReducedMotion = window.matchMedia(
          "(prefers-reduced-motion: reduce)"
        ).matches;

        sections.forEach((section, sectionIndex) => {
          section.classList.add("scroll-animate--section");
          section.style.setProperty("--reveal-delay", `${sectionIndex * 0.03}s`);

          const headline = section.querySelector(".manifesto__headline");
          if (headline) {
            oneShotTargets.push(section);

            const kickers = headline.querySelectorAll(".manifesto__kicker");
            kickers.forEach((kicker, kickerIndex) => {
              kicker.style.setProperty("--reveal-delay", `${0.24 + kickerIndex * 0.22}s`);
              replayTargets.push(kicker);
            });
          } else {
            oneShotTargets.push(section);
            const title = section.querySelector(".content-section__title");
            const text = section.querySelector(".content-section__text");
            if (title) {
              title.classList.add("scroll-animate");
              title.style.setProperty("--reveal-delay", "0.06s");
              oneShotTargets.push(title);
            }
            if (text) {
              text.classList.add("scroll-animate");
              text.style.setProperty("--reveal-delay", "0.18s");
              oneShotTargets.push(text);
            }
          }
        });

        const workShowcase = document.querySelector(".work-showcase");
        if (workShowcase) {
          workShowcase.classList.add("scroll-animate--section");
          oneShotTargets.push(workShowcase);
        }

        if (prefersReducedMotion) {
          [...oneShotTargets, ...replayTargets].forEach((target) =>
            target.classList.add("is-visible")
          );
          return;
        }

        const oneShotObserver = new IntersectionObserver(
          (entries, observer) => {
            entries.forEach((entry) => {
              if (!entry.isIntersecting) return;
              entry.target.classList.add("is-visible");
              observer.unobserve(entry.target);
            });
          },
          {
            threshold: 0.18,
            rootMargin: "0px 0px -10% 0px"
          }
        );

        oneShotTargets.forEach((target) => oneShotObserver.observe(target));

        const replayObserver = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (!entry.target.classList.contains("manifesto__kicker")) return;
              if (entry.isIntersecting) {
                triggerManifestoKickerTicker(entry.target);
              } else {
                resetManifestoKickerTicker(entry.target);
              }
            });
          },
          {
            threshold: 0.22,
            rootMargin: "0px 0px -8% 0px"
          }
        );

        replayTargets.forEach((target) => replayObserver.observe(target));
      }

      function setupManifestoKickerScrollMotion() {
        const kickers = document.querySelectorAll(".manifesto__kicker");
        if (!kickers.length) return;

        let lastY = window.scrollY;
        let rafId = 0;
        let currentShift = 0;
        let targetShift = 0;

        const maxShift = 10;
        const smoothing = 0.11;
        const influence = 0.22;

        const renderShift = (value) => {
          const pxValue = `${value.toFixed(2)}px`;
          kickers.forEach((kicker) => {
            kicker.style.setProperty("--kicker-shift", pxValue);
          });
        };

        const animate = () => {
          currentShift += (targetShift - currentShift) * smoothing;
          renderShift(currentShift);

          if (Math.abs(targetShift - currentShift) < 0.05 && Math.abs(targetShift) < 0.05) {
            currentShift = 0;
            targetShift = 0;
            renderShift(0);
            rafId = 0;
            return;
          }

          rafId = requestAnimationFrame(animate);
        };

        const ensureAnimation = () => {
          if (rafId) return;
          rafId = requestAnimationFrame(animate);
        };

        window.addEventListener(
          "scroll",
          () => {
            const currentY = window.scrollY;
            const deltaY = currentY - lastY;
            lastY = currentY;

            if (deltaY === 0) return;

            // Move labels slightly opposite to scroll direction.
            targetShift -= deltaY * influence;
            targetShift = Math.max(-maxShift, Math.min(maxShift, targetShift));
            ensureAnimation();
          },
          { passive: true }
        );
      }

      function triggerManifestoKickerTicker(kicker) {
        if (!kicker || kicker.dataset.animating === "true") return;

        const originalInner = kicker.querySelector(
          ".manifesto__kicker-inner:not(.manifesto__kicker-inner--clone)"
        );
        if (!originalInner) return;

        kicker.dataset.animating = "true";
        originalInner.classList.remove("manifesto__kicker-inner--exit");
        originalInner.style.opacity = "1";
        originalInner.style.transform = "translate3d(0, 0, 0)";
        originalInner.offsetWidth;
        originalInner.classList.add("manifesto__kicker-inner--exit");

        const clone = originalInner.cloneNode(true);
        clone.classList.remove("manifesto__kicker-inner--exit");
        clone.classList.add("manifesto__kicker-inner--clone", "manifesto__kicker-inner--enter");
        kicker.appendChild(clone);

        originalInner.addEventListener(
          "animationend",
          () => {
            originalInner.classList.remove("manifesto__kicker-inner--exit");
            originalInner.style.opacity = "0";
            originalInner.style.transform = "translate3d(0, 0, 0)";
          },
          { once: true }
        );

        clone.addEventListener(
          "animationend",
          () => {
            clone.remove();
            originalInner.style.opacity = "1";
            originalInner.style.transform = "translate3d(0, 0, 0)";
            kicker.dataset.animating = "false";
          },
          { once: true }
        );
      }

      function resetManifestoKickerTicker(kicker) {
        if (!kicker) return;
        const cloneNodes = kicker.querySelectorAll(".manifesto__kicker-inner--clone");
        cloneNodes.forEach((cloneNode) => cloneNode.remove());

        const originalInner = kicker.querySelector(
          ".manifesto__kicker-inner:not(.manifesto__kicker-inner--clone)"
        );
        if (originalInner) {
          originalInner.classList.remove("manifesto__kicker-inner--exit");
          originalInner.style.opacity = "1";
          originalInner.style.transform = "translate3d(0, 0, 0)";
        }

        kicker.dataset.animating = "false";
      }

      function runIntro() {
        setTimeout(() => {
          animateTitleLetters();
        }, 260);
      }

      function runLoadingProgress(onComplete) {
        const progressStops = ["000", "072", "100"];
        const stepDurationMs = 980;

        progressStops.forEach((value, index) => {
          setTimeout(() => {
            const paddedValue = value.padStart(3, "0");
            const digitsMarkup = paddedValue
              .split("")
              .map(
                (digit, digitIndex) =>
                  `<span class="preloader__counter-digit" style="animation-delay: ${
                    digitIndex * 0.08
                  }s">${digit}</span>`
              )
              .join("");

            preloaderCounterElement.innerHTML = digitsMarkup;

            if (index === progressStops.length - 1) {
              setTimeout(onComplete, 420);
            }
          }, index * stepDurationMs);
        });
      }

      updateLondonTime();
      setInterval(updateLondonTime, 1000);
      setupNavHoverTicker();
      setupWorkShowcaseMarqueeNavLinks();
      setupScrollAnimations();
      setupManifestoKickerScrollMotion();

      window.addEventListener("load", () => {
        const shouldSkipLoader = document.documentElement.classList.contains(
          "skip-main-loader"
        );

        if (shouldSkipLoader) {
          document.body.classList.add("is-loader-skipped");
          document.body.classList.remove("is-loading");
          document.body.classList.add("is-loaded");
          runIntro();
          return;
        }

        runLoadingProgress(() => {
          document.body.classList.remove("is-loading");
          document.body.classList.add("is-loaded");
          runIntro();
        });
      });
    </script>
