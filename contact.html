<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Militsa Yanakieva</title>
    <meta name="description" content="Contact Militsa Yanakieva" />
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      .inner-top__brand {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-weight: 700;
        font-size: 24px;
        letter-spacing: 0.01em;
      }

      .masthead__nav a {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-weight: 700;
        font-size: 20px;
        letter-spacing: 0.01em;
        display: inline-block;
        line-height: 1;
      }

      .sheet--contact {
        padding-top: 0;
      }

      .contact-hero {
        padding-top: clamp(3.25rem, 12vh, 7.5rem);
        padding-bottom: clamp(0.75rem, 2vw, 1.25rem);
        text-align: center;
      }

      .contact-hero__title {
        margin: 0;
        font-family: "Anton", Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
        text-transform: uppercase;
        font-size: clamp(2.6rem, 10.5vw, 9rem);
        line-height: 0.92;
        letter-spacing: 0.012em;
        white-space: nowrap;
        color: #111;
      }

      .contact-hero__title-inner {
        display: inline-flex;
        align-items: baseline;
        white-space: nowrap;
      }

      .contact-hero .letter-mask {
        display: inline-block;
        overflow: hidden;
        position: relative;
      }

      .contact-hero .letter {
        display: inline-block;
        transform: translate3d(var(--start-x, 110%), var(--start-y, 0), 0);
        backface-visibility: hidden;
        -webkit-font-smoothing: antialiased;
        will-change: transform, opacity;
      }

      .contact-hero .letter-mask--space {
        width: 0.28em;
      }

      .contact-hero__title.is-title-animating .letter {
        animation-name: var(--intro-animation, contactEnterFromRight);
        animation-duration: 1.4s;
        animation-delay: var(--delay, 0s);
        animation-timing-function: cubic-bezier(0.76, 0, 0.24, 1);
        animation-fill-mode: forwards;
      }

      .contact-hero__title.is-title-done .letter:not(.letter--clone) {
        transform: translate3d(0, 0, 0);
      }

      .contact-hero .letter.letter--exit {
        animation: contactExitLeft 0.55s cubic-bezier(0.3, 0.05, 0.35, 1) forwards;
      }

      .contact-hero .letter.letter--clone {
        position: absolute;
        top: 0;
        left: 0;
      }

      .contact-hero .letter.letter--enter {
        animation: contactEnterRight 1.45s cubic-bezier(0.62, 0.04, 0.2, 1) forwards;
      }

      @keyframes contactEnterFromRight {
        0% {
          transform: translate3d(110%, 0, 0);
        }
        60% {
          transform: translate3d(-2%, 0, 0);
        }
        100% {
          transform: translate3d(0, 0, 0);
        }
      }

      @keyframes contactEnterFromTop {
        0% {
          transform: translate3d(0, -110%, 0);
        }
        60% {
          transform: translate3d(0, 2%, 0);
        }
        100% {
          transform: translate3d(0, 0, 0);
        }
      }

      @keyframes contactEnterFromBottom {
        0% {
          transform: translate3d(0, 110%, 0);
        }
        60% {
          transform: translate3d(0, -2%, 0);
        }
        100% {
          transform: translate3d(0, 0, 0);
        }
      }

      @keyframes contactExitLeft {
        0% {
          transform: translate3d(0, 0, 0);
        }
        100% {
          transform: translate3d(-110%, 0, 0);
        }
      }

      @keyframes contactEnterRight {
        0% {
          transform: translate3d(110%, 0, 0);
        }
        85% {
          transform: translate3d(-2%, 0, 0);
        }
        100% {
          transform: translate3d(0, 0, 0);
        }
      }

      .contact-hero__rule {
        margin-top: 0;
        margin-bottom: clamp(1.5rem, 4vw, 2.75rem);
      }

      @media (max-width: 900px) {
        .contact-hero {
          padding-top: clamp(2.5rem, 10vh, 5rem);
        }

        .contact-hero__title {
          font-size: clamp(2.15rem, 11.5vw, 6.9rem);
          white-space: normal;
        }

        .contact-hero__title-inner {
          white-space: normal;
          flex-wrap: wrap;
          justify-content: center;
        }
      }

      .subnav__mask {
        display: inline-block;
        overflow: hidden;
        position: relative;
        vertical-align: top;
      }

      .subnav__text {
        display: inline-block;
        transform: translate3d(0, 0, 0);
        will-change: transform, opacity;
      }

      .subnav__text--clone {
        position: absolute;
        top: 0;
        left: 0;
      }

      .subnav__text--exit {
        animation: subNavExitUp 0.45s cubic-bezier(0.4, 0, 0.6, 1) forwards;
      }

      .subnav__text--enter {
        animation: subNavEnterFromBottom 1.3s cubic-bezier(0.76, 0, 0.24, 1)
          forwards;
      }

      @keyframes subNavExitUp {
        0% {
          transform: translate3d(0, 0, 0);
          opacity: 1;
        }
        100% {
          transform: translate3d(0, -110%, 0);
          opacity: 0;
        }
      }

      @keyframes subNavEnterFromBottom {
        0% {
          transform: translate3d(0, 110%, 0);
        }
        85% {
          transform: translate3d(0, -2%, 0);
        }
        100% {
          transform: translate3d(0, 0, 0);
        }
      }
    </style>
  </head>
  <body>
    <a class="skip" href="#main">Skip to content</a>

    <div id="main" class="page page--inner">
      <header class="inner-top site-nav nav--on-light">
        <a class="inner-top__brand" href="./index.html">Militsa Yanakieva</a>
        <nav class="masthead__nav" aria-label="Primary">
          <a class="nav-link" href="./work.html">
            <span class="subnav__mask">
              <span class="subnav__text">Work</span>
            </span>
          </a>
          <a class="nav-link" href="./about.html">
            <span class="subnav__mask">
              <span class="subnav__text">About</span>
            </span>
          </a>
          <a class="nav-link" href="./contact.html" aria-current="page">
            <span class="subnav__mask">
              <span class="subnav__text">Contact</span>
            </span>
          </a>
        </nav>
      </header>

      <main class="sheet sheet--contact" id="main-content" data-theme="light">
        <div class="contact-hero">
          <h1 id="contact-hero-title" class="contact-hero__title" aria-label="Contact me"></h1>
        </div>
        <hr class="sheet__rule contact-hero__rule" />

        <form class="contact-form" action="#" method="post">
          <label class="contact-form__label" for="contact-name">Your name</label>
          <input
            class="contact-form__input"
            id="contact-name"
            name="name"
            type="text"
            autocomplete="name"
            required
          />

          <label class="contact-form__label" for="contact-email">Email address</label>
          <input
            class="contact-form__input"
            id="contact-email"
            name="email"
            type="email"
            autocomplete="email"
            required
          />

          <label class="contact-form__label" for="contact-message">Message</label>
          <textarea
            class="contact-form__textarea"
            id="contact-message"
            name="message"
            rows="10"
            required
          ></textarea>

          <button type="submit" class="contact-form__send">Send</button>
        </form>
      </main>
    </div>

    <script>
      (function () {
        const masks = document.querySelectorAll(".masthead__nav .subnav__mask");

        masks.forEach((mask) => {
          if (mask.dataset.tickerBound === "true") return;
          mask.dataset.tickerBound = "true";

          mask.addEventListener("mouseenter", () => {
            if (mask.dataset.animating === "true") return;

            const originalText = mask.querySelector(".subnav__text:not(.subnav__text--clone)");
            if (!originalText) return;

            mask.dataset.animating = "true";
            originalText.classList.remove("subnav__text--exit");
            originalText.style.opacity = "1";
            originalText.style.transform = "translate3d(0, 0, 0)";
            originalText.offsetWidth;
            originalText.classList.add("subnav__text--exit");

            const clone = originalText.cloneNode(true);
            clone.classList.remove("subnav__text--exit");
            clone.classList.add("subnav__text--clone", "subnav__text--enter");
            mask.appendChild(clone);

            originalText.addEventListener(
              "animationend",
              () => {
                originalText.classList.remove("subnav__text--exit");
                originalText.style.opacity = "0";
                originalText.style.transform = "translate3d(0, 0, 0)";
              },
              { once: true }
            );

            clone.addEventListener(
              "animationend",
              () => {
                clone.remove();
                originalText.style.opacity = "1";
                originalText.style.transform = "translate3d(0, 0, 0)";
                mask.dataset.animating = "false";
              },
              { once: true }
            );
          });
        });
      })();
    </script>
    <script>
      (function () {
        const contactTitleEl = document.getElementById("contact-hero-title");
        const contactTitleText = "CONTACT ME";

        function animateContactTitleLetters() {
          if (!contactTitleEl) return;

          contactTitleEl.classList.remove("is-title-animating", "is-title-done");

          const introDirections = [
            { name: "contactEnterFromRight", startX: "110%", startY: "0%" },
            { name: "contactEnterFromTop", startX: "0%", startY: "-110%" },
            { name: "contactEnterFromBottom", startX: "0%", startY: "110%" }
          ];
          let letterIndex = 0;
          const chars = contactTitleText.split("");

          const titleMarkup = chars
            .map((char) => {
              if (char === " ") {
                return '<span class="letter-mask letter-mask--space" aria-hidden="true"></span>';
              }
              const direction =
                introDirections[Math.floor(Math.random() * introDirections.length)];
              const delay = letterIndex * 0.16;
              letterIndex += 1;
              return `<span class="letter-mask"><span class="letter" style="--delay:${delay.toFixed(
                3
              )}s;--intro-animation:${direction.name};--start-x:${direction.startX};--start-y:${direction.startY};">${char}</span></span>`;
            })
            .join("");

          contactTitleEl.innerHTML = `<span class="contact-hero__title-inner" aria-label="Contact me">${titleMarkup}</span>`;
          contactTitleEl.offsetWidth;
          contactTitleEl.classList.add("is-title-animating");

          const introDurationMs = 1400 + Math.max(0, letterIndex - 1) * 160;
          setTimeout(() => {
            contactTitleEl.classList.remove("is-title-animating");
            contactTitleEl.classList.add("is-title-done");
            setupContactTitleHoverTicker();
          }, introDurationMs + 20);
        }

        function setupContactTitleHoverTicker() {
          if (!contactTitleEl) return;
          const masks = contactTitleEl.querySelectorAll(".letter-mask");

          masks.forEach((mask) => {
            if (mask.classList.contains("letter-mask--space") || mask.dataset.tickerBound === "true") {
              return;
            }
            mask.dataset.tickerBound = "true";
            mask.addEventListener("mouseenter", () => {
              if (mask.dataset.animating === "true") return;

              const originalLetter = mask.querySelector(".letter:not(.letter--clone)");
              if (!originalLetter) return;

              mask.dataset.animating = "true";
              originalLetter.classList.remove("letter--exit");
              originalLetter.style.transform = "translate3d(0, 0, 0)";
              originalLetter.offsetWidth;
              originalLetter.classList.add("letter--exit");

              const clone = originalLetter.cloneNode(true);
              clone.classList.remove("letter--exit");
              clone.classList.add("letter--clone", "letter--enter");
              mask.appendChild(clone);

              originalLetter.addEventListener(
                "animationend",
                () => {
                  originalLetter.classList.remove("letter--exit");
                  originalLetter.style.transform = "translate3d(-110%, 0, 0)";
                },
                { once: true }
              );

              clone.addEventListener(
                "animationend",
                () => {
                  clone.remove();
                  originalLetter.style.transform = "translate3d(0, 0, 0)";
                  mask.dataset.animating = "false";
                },
                { once: true }
              );
            });
          });
        }

        function runContactIntro() {
          setTimeout(animateContactTitleLetters, 140);
        }

        if (document.readyState === "complete") {
          runContactIntro();
        } else {
          window.addEventListener("load", runContactIntro);
        }
      })();
    </script>
    <script src="./main.js"></script>
    <script src="./header-theme.js"></script>
  </body>
</html>
